<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCOLLECTION — Collection Reconciliation</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a0e1a; --navy2: #111827; --navy3: #1a2234; --navy4: #243044; --navy5: #2e3f5c;
            --gold: #c9a84c; --gold2: #e8c96a; --teal: #0d9488; --white: #f8fafc; --gray2: #94a3b8;
            --radius: 8px; --radius2: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow: hidden; }
        
        /* Layout */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        
        .topbar { background: var(--navy2); border-bottom: 1px solid var(--navy4); }
        .topbar-nav-row { display: flex; background: var(--navy3); border-bottom: 1px solid var(--navy4); padding: 0 10px; }
        .nav-btn { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--gray2); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 24px; }
        .page-panel { display: none; }
        .page-panel.active { display: block; }

        /* Generic Hidden Class */
        .hidden { display: none !important; }

        /* Login Box Styles */
        .login-box { background: var(--navy2); padding: 40px; border-radius: 16px; border: 1px solid var(--navy4); width: 100%; max-width: 400px; text-align: center; }
        .form-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--navy3); border: 1px solid var(--navy5); color: white; border-radius: var(--radius); }
        .login-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">iCOLLECTION</h2>
            <input type="email" id="login-email" class="form-input" placeholder="Email Address" value="admin@icollection.app">
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
            <p id="login-error" style="color: #ef4444; font-size: 12px; margin-top: 10px; display: none;">Invalid credentials</p>
        </div>
    </div>

    <div id="app-shell">
        <header class="topbar">
            <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <h1 style="color: var(--gold); font-size: 18px;">iCOLLECTION</h1>
                <div id="user-display" style="font-size: 12px; color: var(--gray2);">
                    <span class="user-name">User Name</span> | <span class="user-role">Role</span>
                </div>
            </div>
            <nav class="topbar-nav-row">
                <button id="btn-dashboard" class="nav-btn active" onclick="showPage('page-dashboard')">Dashboard</button>
                <button id="btn-entries" class="nav-btn" onclick="showPage('page-entries')">Entries</button>
                <button id="btn-admin" class="nav-btn hidden" onclick="showPage('page-admin')">Admin Settings</button>
            </nav>
        </header>

        <main class="main-content">
            <div id="page-dashboard" class="page-panel active">
                <h2>Dashboard</h2>
                <p style="color: var(--gray2);">Welcome back to your collection overview.</p>
            </div>

            <div id="page-entries" class="page-panel">
                <h2>Collection Entries</h2>
                <p style="color: var(--gray2);">Manage your daily collection data here.</p>
            </div>

            <div id="page-admin" class="page-panel">
                <h2>Admin Panel</h2>
                <p style="color: var(--gray2);">System configuration and user management.</p>
            </div>
        </main>
    </div>

                { name: 'Accountant', email: 'staff@icollection.app', roles: ['User'] }
            ]
        };

         * Navigation Controller
         * Ensures only one page is visible and updates nav styling
