<!DOCTYPE html>

    <title>iCOLLECTION — Collection Reconciliation</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a0e1a; --navy2: #111827; --navy3: #1a2234; --navy4: #243044; --navy5: #2e3f5c;
            --gold: #c9a84c; --gold2: #e8c96a; --white: #f8fafc; --gray2: #94a3b8;
            --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow: hidden; }
        
        /* Login UI */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
        .login-box { background: var(--navy2); border: 1px solid var(--navy4); border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow); }
        .form-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--navy3); border: 1px solid var(--navy5); color: white; border-radius: var(--radius); outline: none; }
        .form-input:focus { border-color: var(--gold); }
        .login-btn { width: 100%; padding: 13px; background: var(--gold); color: var(--navy); border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* App Layout */
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        .topbar { background: var(--navy2); border-bottom: 1px solid var(--navy4); }
        .topbar-nav { display: flex; background: var(--navy3); overflow-x: auto; }
        .nav-btn { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--gray2); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 24px; }
        .page-panel { display: none; }
        .page-panel.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--gold); margin-bottom: 8px;">iCOLLECTION</h2>
            <p style="font-size: 13px; color: var(--gray2); margin-bottom: 24px;">Enter your registered email to begin</p>
            
            <input type="email" id="login-email" class="form-input" placeholder="Email Address" autocomplete="email">
            <button class="login-btn" id="signin-btn">Sign In</button>
            
            <p id="login-error" style="color: #ef4444; font-size: 12px; margin-top: 15px; display: none;">Email not found. Please check spelling.</p>
        </div>
    </div>

    <div id="app-shell">
        <header class="topbar">
            <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
                <h1 style="color: var(--gold); font-size: 18px;">iCOLLECTION</h1>
                <div style="font-size: 12px; color: var(--gray2);">
                    <span id="display-name" style="color: white; font-weight:600;"></span> | <span id="display-role"></span>
                    <button onclick="location.reload()" style="margin-left:10px; color:var(--gold); background:none; border:none; cursor:pointer;">Logout</button>
                </div>
            </div>
            <nav class="topbar-nav">
                <button class="nav-btn active" onclick="showPage('page-dashboard', this)">Dashboard</button>
                <button class="nav-btn" onclick="showPage('page-entries', this)">Entries</button>
                <button id="nav-admin" class="nav-btn hidden" onclick="showPage('page-admin', this)">Admin</button>
            </nav>
        </header>

        <main class="main-content">
            <div id="page-dashboard" class="page-panel active">
                <h2>Welcome to Dashboard</h2>
                <p style="color: var(--gray2); margin-top:10px;">Select 'Entries' to start reconciliation.</p>
            </div>
            <div id="page-entries" class="page-panel">
                <h2>Collection Entries</h2>
                <p style="color: var(--gray2); margin-top:10px;">No entries found for today.</p>
            </div>
            <div id="page-admin" class="page-panel">
                <h2>Admin Settings</h2>
                <p style="color: var(--gray2); margin-top:10px;">User management and system logs.</p>
            </div>
        </main>
    </div>

        // 1. Navigation Controller
        function showPage(pageId, btnEl) {
            document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
        }

        // 2. Login Logic
        function handleLogin() {
            const emailInput = document.getElementById('login-email').value.trim().toLowerCase();
            const errorEl = document.getElementById('login-error');
            
            // Search for user
            const user = USER_DB.find(u => u.email.toLowerCase() === emailInput);

            if (user) {
                // Success
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-shell').style.display = 'flex';
                
                document.getElementById('display-name').textContent = user.name;
                document.getElementById('display-role').textContent = user.roles.join(', ');

                // Show Admin tab if roles match
                if (user.roles.some(r => ['Admin', 'Founder'].includes(r))) {
                    document.getElementById('nav-admin').classList.remove('hidden');
                }
            } else {
                // Failure
                errorEl.style.display = 'block';
                console.log("Failed login attempt for:", emailInput);
            }
        }

        // Event Listeners
        document.getElementById('signin-btn').addEventListener('click', handleLogin);
        document.getElementById('login-email').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleLogin();
        });
