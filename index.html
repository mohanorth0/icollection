<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCOLLECTION — Collection Reconciliation</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a0e1a; --navy2: #111827; --navy3: #1a2234; --navy4: #243044; --navy5: #2e3f5c;
            --gold: #c9a84c; --gold2: #e8c96a; --teal: #0d9488; --white: #f8fafc; --gray2: #94a3b8;
            --radius: 8px; --radius2: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow: hidden; }
        
        /* Login Styles */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); position: relative; }
        .login-box { background: var(--navy2); border: 1px solid var(--navy4); border-radius: 16px; padding: 48px; width: 100%; max-width: 460px; box-shadow: var(--shadow); text-align: center; z-index: 10; }
        .form-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--navy3); border: 1px solid var(--navy5); color: white; border-radius: var(--radius); outline: none; }
        .form-input:focus { border-color: var(--gold); }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* App Layout */
        #app-shell { display: none; height: 100vh; flex-direction: column; }
        .topbar { background: var(--navy2); border-bottom: 1px solid var(--navy4); }
        .topbar-nav-row { display: flex; background: var(--navy3); border-bottom: 1px solid var(--navy4); padding: 0 10px; overflow-x: auto; }
        .nav-btn { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--gray2); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 24px; }
        .page-panel { display: none; }
        .page-panel.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div style="background: var(--gold); width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--navy); font-weight: bold; font-size: 20px;">iC</div>
            <h2 style="margin-bottom: 8px;">iCOLLECTION</h2>
            <p style="font-size: 13px; color: var(--gray2); margin-bottom: 24px;">Collection Reconciliation System</p>
            
            <input type="email" id="login-email" class="form-input" placeholder="Email Address" onkeydown="if(event.key==='Enter')handleLogin()">
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
